<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Estreno Depa! - Invitación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="splash-screen" class="splash-screen">
        <div class="envelope-container" id="envelope-container">
            <div class="envelope" id="clickable-envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body"></div>
                <div class="letter">
                    <p class="letter-text">Holaaa! Tengo depa nuevo<br>y tú estás invitado(a) 🎉</p>
                </div>
                <div class="heart-seal">
                    <img src="assets/sello.png" alt="Sello" />
                </div>
            </div>
        </div>
    </div>

    <main id="invitation-content" class="invitation-content hidden">
        <div class="invitation-card">
            <header class="invitation-header">
                <h1 class="title">¡Estreno depa!</h1>
                <p class="subtitle">Me encantaría que me acompañes a celebrar este pequeño gasto hormiga</p>
            </header>

            <section class="event-details">
                <div class="stamps-container">
                    <div class="stamp datetime-stamp">
                        <div class="stamp-item">
                            <div class="stamp-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="3" y="6" width="18" height="15" rx="2" stroke="currentColor" stroke-width="2"/>
                                    <path d="M3 10h18M8 3v6M16 3v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="stamp-text">30 de Marzo, 5PM</span>
                        </div>                       
                    </div>

                    <div class="stamp location-stamp">
                        <div class="stamp-item">
                            <div class="stamp-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/>
                                    <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </div>
                            <span class="stamp-text">Fidel Tubino 257, San Miguel</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="action-buttons">
                <a href="https://maps.app.goo.gl/hrb3nr3xLEcDdgjx8?g_st=iw" target="_blank" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Cómo Llegar</span>
                </a>

                <a href="lista.html" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 12v-1.5c0-1-1-1.5-1-1.5L13 7 8.5 4.5 7 5l3 2.5V11l-4 1v-1l-2 1v4l2 1v-1l4 1v3.5l-3 2.5 1.5.5L13 20l6-2.5s1-.5 1-1.5V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Lista de Regalos</span>
                </a>

                <a href="https://wa.me/51946719657?text=Confirmo%20mi%20asistencia%20%3A)" target="_blank" class="btn btn-accent">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>Confirmar Asistencia</span>
                </a>
            </section>

            <footer class="invitation-footer">
                <p class="subtitle">Tu presencia es mi mejor regalo (pero igual trae uno)!</p>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="page-transition.js"></script>
</body>
</html>
